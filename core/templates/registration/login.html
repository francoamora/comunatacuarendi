{% load static %}
<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Comuna de Tacuarendí</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- ESTILOS DEL LOGIN PRO --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Manrope', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0f172a;
            position: relative;
            overflow: hidden;
        }

        /* Fondo con imagen y overlay */
        .bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('{% static "core/img/gestion.jpeg" %}');
            background-size: cover;
            background-position: center;
            filter: blur(8px); /* Efecto borroso elegante */
            transform: scale(1.1); /* Para evitar bordes blancos por el blur */
            z-index: 0;
        }
        .bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.7), rgba(22, 163, 74, 0.8));
            z-index: 1;
        }

        /* Tarjeta de Login */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* Logo y Títulos */
        .logo-img {
            height: 80px;
            width: auto;
            margin-bottom: 20px;
        }
        h1 {
            color: #1e293b;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Inputs Modernos */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #334155;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #f8fafc;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #16a34a;
            background: white;
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.1);
        }

        /* Botón */
        .btn-login {
            width: 100%;
            background: #16a34a;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #15803d;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(22, 163, 74, 0.3);
        }

        /* Footer del card */
        .card-footer {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            font-size: 0.9rem;
        }
        .card-footer a {
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .card-footer a:hover {
            color: #16a34a;
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <div class="login-card">
        <a href="{% url 'home' %}">
            <img src="{% static 'core/img/logo.png' %}" alt="Tacuarendí" class="logo-img">
        </a>
        <h1>Acceso al Sistema</h1>
        <p class="subtitle">Gestión Comunal de Tacuarendí</p>

        {% if form.errors %}
            <div class="error-message">
                <i class="fa-solid fa-circle-exclamation"></i> Usuario o contraseña incorrectos.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" autofocus required id="id_username" placeholder="Ingresá tu usuario">
            </div>

            <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" required id="id_password" placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login">
                Ingresar <i class="fa-solid fa-arrow-right-to-bracket" style="margin-left:8px;"></i>
            </button>
        </form>

        <div class="card-footer">
            <a href="{% url 'home' %}"><i class="fa-solid fa-arrow-left"></i> Volver al sitio web</a>
        </div>
    </div>

</body>
</html>
